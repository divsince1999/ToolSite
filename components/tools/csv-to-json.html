<div class="tool-area-group">
    <div class="input-group">
        <label for="csv-input" class="label">Input CSV</label>
        <textarea id="csv-input" class="textarea"
            placeholder="id,name,city\n1,John,New York\n2,Jane,London"></textarea>
    </div>

    <div class="btn-wrapper mt-md">
        <button class="btn btn-primary" id="btn-convert">Convert to JSON</button>
    </div>

    <div class="input-group mt-lg">
        <label for="json-output" class="label">JSON Result</label>
        <textarea id="json-output" class="textarea" readonly
            placeholder="Result will appear here..."></textarea>
    </div>

    <div class="btn-wrapper mt-md">
        <button class="btn btn-primary" id="btn-copy">Copy JSON</button>
        <button class="btn btn-outline" id="btn-clear">Clear</button>
    </div>
</div>
