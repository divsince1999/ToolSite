<div class="tool-area-group">
    <div class="input-group">
        <label for="input-text" class="label">Article Title / Text</label>
        <input type="text" id="input-text" class="input-field"
            placeholder="Enter text here... e.g., How to Start a Business in 2026"
            style="width: 100%;">
    </div>

    <div class="btn-wrapper mt-md">
        <button class="btn btn-primary" id="btn-process">Generate Slug</button>
    </div>

    <div class="input-group mt-lg">
        <label for="output-text" class="label">SEO-Friendly Slug</label>
        <input type="text" id="output-text" class="input-field" readonly
            placeholder="how-to-start-a-business-in-2026"
            style="width: 100%; font-family: 'Courier New', Courier, monospace;">
    </div>

    <div class="btn-wrapper mt-md">
        <button class="btn btn-outline" id="btn-copy">Copy Slug</button>
        <button class="btn btn-outline" id="btn-clear">Clear</button>
    </div>
</div>
