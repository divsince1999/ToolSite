<div class="tool-area-group">
    <!-- Configuration Section -->
    <div class="settings-header mb-md">
        <h3 class="mb-sm">Customize Password</h3>
        <p class="text-muted" style="font-size: 0.9rem;">Adjust length and security options below.</p>
    </div>

    <div class="input-group">
        <label class="label">Password Length</label>
        <div class="range-wrapper">
            <input type="range" id="length-slider" min="6" max="64" value="16" class="range-input">
            <span id="length-val" class="range-value">16</span>
        </div>
    </div>

    <div class="checkbox-grid">
        <label class="checkbox-item">
            <input type="checkbox" id="inc-upper" checked>
            <span>Uppercase (A-Z)</span>
        </label>
        <label class="checkbox-item">
            <input type="checkbox" id="inc-lower" checked>
            <span>Lowercase (a-z)</span>
        </label>
        <label class="checkbox-item">
            <input type="checkbox" id="inc-numbers" checked>
            <span>Numbers (0-9)</span>
        </label>
        <label class="checkbox-item">
            <input type="checkbox" id="inc-symbols" checked>
            <span>Symbols (!@#$%)</span>
        </label>
    </div>

    <!-- Output Section -->
    <div class="generator-output-container mt-lg">
        <span class="generator-label">Generated Password</span>
        <div id="password-output" class="generator-value">********</div>
    </div>

    <div class="btn-wrapper mt-lg">
        <button class="btn btn-primary" id="btn-generate">
            Generate New Password
        </button>
        <button class="btn btn-outline" id="btn-copy">
            Copy to Clipboard
        </button>
    </div>
</div>
