<div class="tool-area-group">
    <div class="input-group">
        <label for="input-text" class="label">Input Binary</label>
        <textarea id="input-text" class="textarea"
            placeholder="Paste binary code here (e.g., 01001000 01101001)"></textarea>
    </div>

    <div class="input-group mt-lg">
        <label for="output-text" class="label">Readable Text</label>
        <textarea id="output-text" class="textarea" readonly
            placeholder="Decoded text will appear here..."></textarea>
    </div>

    <div class="btn-wrapper mt-md">
        <button class="btn btn-primary" id="btn-copy">Copy Text</button>
        <button class="btn btn-outline" id="btn-clear">Clear</button>
    </div>
</div>
