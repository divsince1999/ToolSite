<div class="tool-area-group">
    <div class="input-group">
        <label for="input-text" class="label">Multi-Line Input</label>
        <textarea id="input-text" class="textarea"
            placeholder="Paste your multi-line text here..." style="min-height: 200px;"></textarea>
    </div>

    <div class="btn-wrapper mt-md">
        <button class="btn btn-primary" id="btn-process">Remove Line Breaks</button>
    </div>

    <div class="input-group mt-lg">
        <label for="output-text" class="label">Single-Line Result</label>
        <textarea id="output-text" class="textarea" readonly
            placeholder="Result will appear here..."></textarea>
    </div>

    <div class="btn-wrapper mt-md">
        <button class="btn btn-outline" id="btn-copy">Copy Result</button>
        <button class="btn btn-outline" id="btn-clear">Clear</button>
    </div>
</div>
