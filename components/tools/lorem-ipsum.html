<div class="tool-area-group">
    <div class="input-group mb-lg">
        <label for="paragraph-count" class="label">Number of Paragraphs</label>
        <input type="number" id="paragraph-count" class="input-field" value="3" min="1" max="50"
            style="width: 100%;">
    </div>

    <div class="btn-wrapper">
        <button class="btn btn-primary" id="btn-generate">Generate Text</button>
    </div>

    <div class="input-group mt-lg">
        <label for="lorem-output" class="label">Generated Result</label>
        <textarea id="lorem-output" class="textarea" readonly
            placeholder="Result will appear here..." style="min-height: 300px;"></textarea>
    </div>

    <div class="btn-wrapper mt-md">
        <button class="btn btn-outline" id="btn-copy">Copy Result</button>
    </div>
</div>
