<div class="tool-area-group">
    <div class="input-group">
        <label for="input-text" class="label">Input String</label>
        <textarea id="input-text" class="textarea"
            placeholder="Type or paste text to reverse..."></textarea>
    </div>

    <div class="btn-wrapper mt-md">
        <button class="btn btn-primary" id="btn-reverse">Reverse Text</button>
    </div>

    <div class="input-group mt-lg">
        <label for="output-text" class="label">Reversed Result</label>
        <textarea id="output-text" class="textarea" readonly
            placeholder="dlrow olleh..."></textarea>
    </div>

    <div class="btn-wrapper mt-md">
        <button class="btn btn-outline" id="btn-copy">Copy Result</button>
        <button class="btn btn-outline" id="btn-clear">Clear</button>
    </div>
</div>
