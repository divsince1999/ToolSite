<div class="tool-area-group">
    <div class="settings-header mb-md">
        <h3 class="mb-sm">String Configuration</h3>
        <p class="text-muted" style="font-size: 0.9rem;">Define the length and character set.</p>
    </div>

    <div class="input-row-flex">
        <div class="input-group">
            <label for="string-length" class="label">Characters Count</label>
            <input type="number" id="string-length" class="input-field" value="12" min="1" max="1000">
        </div>
        <div class="input-group">
            <label for="char-type" class="label">Character Set</label>
            <select id="char-type" class="select-input">
                <option value="alphanumeric">Alphanumeric (Mix)</option>
                <option value="letters" selected>Letters Only (A-Z)</option>
                <option value="numbers">Numbers Only (0-9)</option>
            </select>
        </div>
    </div>

    <!-- Output Section -->
    <div class="generator-output-container mt-lg">
        <span class="generator-label">Random String</span>
        <div id="string-output" class="generator-value" style="font-size: clamp(1.2rem, 3vw, 1.8rem);">
            Waiting...
        </div>
    </div>

    <div class="btn-wrapper mt-lg">
        <button class="btn btn-primary" id="btn-generate">
            Generate New String
        </button>
        <button class="btn btn-outline" id="btn-copy">
            Copy to Clipboard
        </button>
    </div>
</div>
